          - heading "APPROACH" [level=2] [ref=e88]:
            - generic [ref=e90]: APPROACH
          - paragraph [ref=e91]: Three principles shape how the camp is taught, who's in the room, and how everyone spends their afternoons.
        - generic [ref=e92]:
          - article [ref=e93]:
            - generic [ref=e94]: "01"
            - heading "The academics and the summer are both real" [level=3] [ref=e96]
            - paragraph [ref=e97]: The learning program and the extracurricular program are built with equal care. Mornings go deep into AI. Afternoons go to Tenerife's beaches, trails, and historic towns. Neither half is filler, and you don't have to sacrifice one to get the other.
          - article [ref=e98]:
            - generic [ref=e99]: "02"
            - heading "Two tracks, one community" [level=3] [ref=e101]
            - paragraph [ref=e102]: Foundations and applied ML run in parallel, plus a team research sprint that cuts across both. Mornings you're in your track; afternoons and evenings the whole cohort is together — meals, labs, problem sets, hikes.
          - article [ref=e103]:
            - generic [ref=e104]: "03"
            - heading "The highest level is in the room" [level=3] [ref=e106]
            - paragraph [ref=e107]: Students selected from the IOAI Spain qualifier, taught by researchers who publish at NeurIPS and ICML, with industry mentors from Barcelona's AI labs. Ambition is the baseline.
      - generic [ref=e110]:
