        - generic [ref=e232]:
          - paragraph [ref=e233]: Outside of study hours, campers have a full schedule of activities across Tenerife — beaches, national parks, historic towns, and cultural workshops. Two weeks of afternoons and evenings, planned but never crammed. Here's the day-by-day.
          - list [ref=e234]:
            - listitem [ref=e235]:
              - paragraph [ref=e236]: Day 01
              - heading "Welcome & getting to know each other" [level=3] [ref=e237]
              - paragraph [ref=e238]: The camp kicks off with a walk along the seafront of Puerto de la Cruz, finishing at the historic Plaza del Charco. Along the way, campers take part in a simple but effective icebreaker — sharing their name, something they love, and their plans for the future. By the end of the evening, the group already feels like a group.
            - listitem [ref=e239]:
              - paragraph [ref=e240]: Day 02
              - heading "Historic Puerto de la Cruz" [level=3] [ref=e241]
              - paragraph [ref=e242]: Campers explore the old town on a guided cultural walk that brings local history to life. Highlights include the 17th-century Church of Nuestra Señora de la Peña de Francia, the town's historic fishing pier — once used to export Malvasia wine — Playa Jardín designed by celebrated Canarian artist César Manrique, and the Castle of San Felipe, a coastal fortress built to defend against pirates. The walk ends back at the iconic Lago Martiánez pool complex.
            - listitem [ref=e243]:
              - paragraph [ref=e244]: Day 03
              - heading "Beach sports" [level=3] [ref=e245]
              - paragraph [ref=e246]: A full afternoon at Playa Jardín with volleyball, football, tennis and frisbee. Campers rotate through activities in small groups, keeping it social, competitive and fun.
            - listitem [ref=e247]:
              - paragraph [ref=e248]: Day 04
              - heading "Yoga workshop & beach" [level=3] [ref=e249]
              - paragraph [ref=e250]: A more mindful afternoon. While some campers enjoy the beach, others take part in a yoga workshop designed to balance the physical intensity of the week with self-care and reflection. Every camper gets their session.
            - listitem [ref=e251]:
              - paragraph [ref=e252]: Day 05
              - heading "Rambla de Castro coastal trail" [level=3] [ref=e253]
              - paragraph [ref=e254]: A scenic coastal hike through one of Tenerife's most beautiful natural routes. The group passes black-sand coves, a historic 1903 steam-engine pumping station, a wooden bridge over a ravine, an 18th-century coastal fort, and arrives at Mirador de San Pedro — a clifftop viewpoint with sweeping ocean views.
            - listitem [ref=e255]:
              - paragraph [ref=e256]: Day 06
              - heading "Traditional Canarian games" [level=3] [ref=e257]
              - paragraph [ref=e258]: "Back at Playa Jardín for an afternoon of traditional games from the Canary Islands: crab races, tug-of-war and the handkerchief game. Loud, fun, and a genuine window into local culture."
            - listitem [ref=e259]:
              - paragraph [ref=e260]: Day 07
              - heading "Zip-line park at Forestal Park" [level=3] [ref=e261]
              - paragraph [ref=e262]: A special day at Forestal Park Tenerife, a high-altitude adventure park in the forests of Monte de La Esperanza. Before heading in, the group takes part in a short session on emotions — naming them, noticing them, and letting go of the negative ones through a dreamcatcher activity afterward. Lunch is a picnic in the forest.
            - listitem [ref=e263]:
              - paragraph [ref=e264]: Day 08
              - heading "Teide National Park & Observatory" [level=3] [ref=e265]
              - paragraph [ref=e266]: A full-day excursion to the top of Tenerife. One group visits the Teide Observatory, home to leading European solar telescopes. The other explores the El Portillo Visitor Centre, with exhibitions on volcanic geology, a botanical garden of native species and a simulated volcanic tube. Both groups then meet at Roques de García for lunch and a breathing and nature connection activity, surrounded by one of the most dramatic landscapes in Europe.
            - listitem [ref=e267]:
              - paragraph [ref=e268]: Day 09
              - heading "La Orotava cultural walk" [level=3] [ref=e269]
              - paragraph [ref=e270]: A guided tour through the beautifully preserved historic town of La Orotava. Campers visit a neo-Gothic chapel, a 19th-century French garden with panoramic views, the iconic Casa de los Balcones with its carved wooden architecture, and a traditional gofio mill — a staple of Canarian food culture.
            - listitem [ref=e271]:
              - paragraph [ref=e272]: Day 10
              - heading "Surfing at Playa Martiánez" [level=3] [ref=e273]
              - paragraph [ref=e274]: Just five minutes from the hotel, campers try surfing for the first time (or build on what they know) in small groups with professional instructors. While half surf, the other half enjoy the beach or the hotel pool.
            - listitem [ref=e275]:
              - paragraph [ref=e276]: Day 11
              - heading "Painting workshop & beach" [level=3] [ref=e277]
              - paragraph [ref=e278]: An afternoon combining creativity with sunshine. Campers take a guided painting workshop on the beach, turning their impressions of the trip into their own artwork. A quieter, more reflective counterpoint to the more active days.
            - listitem [ref=e279]:
              - paragraph [ref=e280]: Day 12
              - heading "Surfing, round two" [level=3] [ref=e281]
              - paragraph [ref=e282]: Another session in the water, with extended surf classes for all participants. More time in the sea, more time to progress.
            - listitem [ref=e283]:
              - paragraph [ref=e284]: Day 13
              - heading "Farewell beach games" [level=3] [ref=e285]
              - paragraph [ref=e286]: "The last beach afternoon: handball, beach paddles, gymkhana obstacle courses and relay races. Before leaving, the whole group gathers in a circle to share their favourite memory of Tenerife."
            - listitem [ref=e287]:
              - paragraph [ref=e288]: Day 14
              - heading "Loro Parque" [level=3] [ref=e289]
              - paragraph [ref=e290]: The final special-day excursion takes campers to Loro Parque, one of Europe's most celebrated wildlife parks. The visit is designed not just as a fun day out, but as a meaningful encounter with animal welfare and biodiversity conservation — themes that connect to the broader values of the camp.
            - listitem [ref=e291]:
              - paragraph [ref=e292]: Day 15
              - heading "Farewell & the jar of messages" [level=3] [ref=e293]
              - paragraph [ref=e294]: "The last day brings the group together for a final activity: the jar of messages. Each camper writes a note — a reflection, an encouragement, a memory — folds it up and adds it to a shared jar. It's a simple, powerful way to close two weeks of shared experience. The day ends with a collective farewell discussion and the kind of goodbyes that usually involve promises to stay in touch."
      - generic [ref=e298]:
        - generic [ref=e299]:
          - heading "VENUE" [level=2] [ref=e300]:
            - generic [ref=e302]: VENUE
          - paragraph [ref=e303]: Two weeks on the northern coast of Tenerife — a 4-star hotel two minutes from the beach, dedicated classrooms a short walk away, and the rest of the island within easy reach for the afternoon programme.
        - generic [ref=e304]:
          - generic [ref=e305]:
            - heading "The hotel" [level=3] [ref=e306]
            - paragraph [ref=e307]: Campers stay at a 4-star property in Puerto de la Cruz, two minutes on foot from Martiánez beach. Rooms are shared between three campers, with all meals — breakfast, lunch and dinner — included on site. The northern coast keeps a mild climate even at the height of summer, so the hotel terrace becomes a second living room.
          - generic [ref=e309]: The hotel
        - generic [ref=e310]:
          - generic [ref=e311]:
            - heading "The classrooms" [level=3] [ref=e312]
            - paragraph [ref=e313]: Teaching happens in a dedicated block of four classrooms plus a larger seminar hall — flexible enough for a morning lecture and an afternoon hackathon. Wi-fi is fast, wired desks are available for heavier workloads, and a small library and outdoor shaded terrace round out the spaces students gravitate to between sessions.
          - generic [ref=e315]: The classrooms
      - generic [ref=e318]:
        - generic [ref=e319]:
          - heading "SAFETY" [level=2] [ref=e320]:
            - generic [ref=e322]: SAFETY
          - paragraph [ref=e323]: Your child is looked after at all times. Nineteen dedicated supervisors on the ground plus eight coaches who are always accessible — for help with learning, with activities, or with anything in between. All staff have extensive experience working with children and are trained to be attentive to individual needs and age group. Camp insurance is included in the price.
        - generic [ref=e326]: Safety
      - generic [ref=e329]:
        - generic [ref=e330]:
          - heading "A DAY AT TENERIFE" [level=2] [ref=e331]:
            - generic [ref=e333]: A DAY AT TENERIFE
          - img [ref=e335]
        - generic [ref=e351]:
          - paragraph [ref=e352]: Every day at the camp follows the same rhythm — morning learning blocks, an unhurried lunch, the afternoon programme on the island, dinner together, and a deliberately quiet evening before the next early start. Here's how a typical day breaks down.
          - list [ref=e353]:
            - listitem [ref=e354]:
              - paragraph [ref=e355]: 7:00am – 9:00am
              - heading "Early rise" [level=3] [ref=e356]
              - paragraph [ref=e357]: The day starts with a morning workout, a quick clean-up, and the day's announcements. Then a generous breakfast to power through the first lecture block.
            - listitem [ref=e358]:
              - paragraph [ref=e359]: 9:30am – 11:00am
              - heading "1st period" [level=3] [ref=e360]
              - paragraph [ref=e361]: Students pick up the day's coding skills through a mix of lectures, hands-on practice, and short quizzes that keep the room awake and accountable.
            - listitem [ref=e362]:
              - paragraph [ref=e363]: 11:00am – 11:30am
              - heading "Snack time" [level=3] [ref=e364]
              - paragraph [ref=e365]: A short break to recharge with something nutritious. Energy back up, attention reset, ready for the next block.
            - listitem [ref=e366]:
              - paragraph [ref=e367]: 11:30am – 1:00pm
              - heading "2nd period" [level=3] [ref=e368]
              - paragraph [ref=e369]: The second teaching block leans into individual practice — the instructor circulates while students build their own small projects from the morning's material.
            - listitem [ref=e370]:
              - paragraph [ref=e371]: 1:30pm – 4:00pm
              - heading "Lunch" [level=3] [ref=e372]
              - paragraph [ref=e373]: A long, well-balanced lunch on site. Time to eat, talk, and rest before the afternoon programme picks up.
