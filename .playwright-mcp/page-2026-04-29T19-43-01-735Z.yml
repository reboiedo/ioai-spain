      - generic [ref=e222]:
        - heading "ACTIVITIES" [level=2] [ref=e223]:
          - generic [ref=e225]: ACTIVITIES
        - paragraph [ref=e226]: Outside of study hours, campers have a full schedule of activities across Tenerife — beaches, national parks, historic towns, and cultural workshops. Tap a polaroid to read what's on for that day.
        - generic [ref=e228]:
          - 'button "Day 1: Welcome & getting to know each other — tap to read description" [ref=e229] [cursor=pointer]':
            - img "Welcome & getting to know each other" [ref=e231]
            - generic [ref=e232]:
              - paragraph [ref=e233]: Day 1
              - heading "Welcome & getting to know each other" [level=3] [ref=e234]
            - paragraph [ref=e236]: The camp kicks off with a walk along the seafront of Puerto de la Cruz, finishing at the historic Plaza del Charco. Along the way, campers take part in a simple but effective icebreaker — sharing their name, something they love, and their plans for the future. By the end of the evening, the group already feels like a group.
          - 'button "Day 2: Historic Puerto de la Cruz — tap to read description" [ref=e237] [cursor=pointer]':
            - img "Historic Puerto de la Cruz" [ref=e239]
            - generic [ref=e240]:
              - paragraph [ref=e241]: Day 2
              - heading "Historic Puerto de la Cruz" [level=3] [ref=e242]
            - paragraph [ref=e244]: Campers explore the old town on a guided cultural walk that brings local history to life. Highlights include the 17th-century Church of Nuestra Señora de la Peña de Francia, the town's historic fishing pier — once used to export Malvasia wine — Playa Jardín designed by celebrated Canarian artist César Manrique, and the Castle of San Felipe, a coastal fortress built to defend against pirates. The walk ends back at the iconic Lago Martiánez pool complex.
          - 'button "Day 3: Beach sports — tap to read description" [ref=e245] [cursor=pointer]':
            - img "Beach sports" [ref=e247]
            - generic [ref=e248]:
              - paragraph [ref=e249]: Day 3
              - heading "Beach sports" [level=3] [ref=e250]
            - paragraph [ref=e252]: A full afternoon at Playa Jardín with volleyball, football, tennis and frisbee. Campers rotate through activities in small groups, keeping it social, competitive and fun.
          - 'button "Day 4: Yoga workshop & beach — tap to read description" [ref=e253] [cursor=pointer]':
            - img "Yoga workshop & beach" [ref=e255]
            - generic [ref=e256]:
              - paragraph [ref=e257]: Day 4
              - heading "Yoga workshop & beach" [level=3] [ref=e258]
            - paragraph [ref=e260]: A more mindful afternoon. While some campers enjoy the beach, others take part in a yoga workshop designed to balance the physical intensity of the week with self-care and reflection. Every camper gets their session.
          - 'button "Day 5: Rambla de Castro coastal trail — tap to read description" [ref=e261] [cursor=pointer]':
            - img "Rambla de Castro coastal trail" [ref=e263]
            - generic [ref=e264]:
              - paragraph [ref=e265]: Day 5
              - heading "Rambla de Castro coastal trail" [level=3] [ref=e266]
            - paragraph [ref=e268]: A scenic coastal hike through one of Tenerife's most beautiful natural routes. The group passes black-sand coves, a historic 1903 steam-engine pumping station, a wooden bridge over a ravine, an 18th-century coastal fort, and arrives at Mirador de San Pedro — a clifftop viewpoint with sweeping ocean views.
          - 'button "Day 6: Traditional Canarian games — tap to read description" [ref=e269] [cursor=pointer]':
            - img "Traditional Canarian games" [ref=e271]
            - generic [ref=e272]:
              - paragraph [ref=e273]: Day 6
              - heading "Traditional Canarian games" [level=3] [ref=e274]
            - paragraph [ref=e276]: "Back at Playa Jardín for an afternoon of traditional games from the Canary Islands: crab races, tug-of-war and the handkerchief game. Loud, fun, and a genuine window into local culture."
          - 'button "Day 7: Zip-line park at Forestal Park — tap to read description" [ref=e277] [cursor=pointer]':
            - img "Zip-line park at Forestal Park" [ref=e279]
            - generic [ref=e280]:
              - paragraph [ref=e281]: Day 7
              - heading "Zip-line park at Forestal Park" [level=3] [ref=e282]
            - paragraph [ref=e284]: A special day at Forestal Park Tenerife, a high-altitude adventure park in the forests of Monte de La Esperanza. Before heading in, the group takes part in a short session on emotions — naming them, noticing them, and letting go of the negative ones through a dreamcatcher activity afterward. Lunch is a picnic in the forest.
          - 'button "Day 8: Teide National Park & Observatory — tap to read description" [ref=e285] [cursor=pointer]':
            - img "Teide National Park & Observatory" [ref=e287]
            - generic [ref=e288]:
              - paragraph [ref=e289]: Day 8
              - heading "Teide National Park & Observatory" [level=3] [ref=e290]
            - paragraph [ref=e292]: A full-day excursion to the top of Tenerife. One group visits the Teide Observatory, home to leading European solar telescopes. The other explores the El Portillo Visitor Centre, with exhibitions on volcanic geology, a botanical garden of native species and a simulated volcanic tube. Both groups then meet at Roques de García for lunch and a breathing and nature connection activity, surrounded by one of the most dramatic landscapes in Europe.
          - 'button "Day 9: La Orotava cultural walk — tap to read description" [ref=e293] [cursor=pointer]':
            - img "La Orotava cultural walk" [ref=e295]
            - generic [ref=e296]:
              - paragraph [ref=e297]: Day 9
              - heading "La Orotava cultural walk" [level=3] [ref=e298]
            - paragraph [ref=e300]: A guided tour through the beautifully preserved historic town of La Orotava. Campers visit a neo-Gothic chapel, a 19th-century French garden with panoramic views, the iconic Casa de los Balcones with its carved wooden architecture, and a traditional gofio mill — a staple of Canarian food culture.
          - 'button "Day 10: Surfing at Playa Martiánez — tap to read description" [ref=e301] [cursor=pointer]':
            - img "Surfing at Playa Martiánez" [ref=e303]
            - generic [ref=e304]:
              - paragraph [ref=e305]: Day 10
              - heading "Surfing at Playa Martiánez" [level=3] [ref=e306]
            - paragraph [ref=e308]: Just five minutes from the hotel, campers try surfing for the first time (or build on what they know) in small groups with professional instructors. While half surf, the other half enjoy the beach or the hotel pool.
          - 'button "Day 11: Painting workshop & beach — tap to read description" [ref=e309] [cursor=pointer]':
            - img "Painting workshop & beach" [ref=e311]
            - generic [ref=e312]:
              - paragraph [ref=e313]: Day 11
              - heading "Painting workshop & beach" [level=3] [ref=e314]
            - paragraph [ref=e316]: An afternoon combining creativity with sunshine. Campers take a guided painting workshop on the beach, turning their impressions of the trip into their own artwork. A quieter, more reflective counterpoint to the more active days.
          - 'button "Day 12: Surfing, round two — tap to read description" [ref=e317] [cursor=pointer]':
            - img "Surfing, round two" [ref=e319]
            - generic [ref=e320]:
              - paragraph [ref=e321]: Day 12
              - heading "Surfing, round two" [level=3] [ref=e322]
            - paragraph [ref=e324]: Another session in the water, with extended surf classes for all participants. More time in the sea, more time to progress.
          - 'button "Day 13: Farewell beach games — tap to read description" [ref=e325] [cursor=pointer]':
            - img "Farewell beach games" [ref=e327]
            - generic [ref=e328]:
              - paragraph [ref=e329]: Day 13
              - heading "Farewell beach games" [level=3] [ref=e330]
            - paragraph [ref=e332]: "The last beach afternoon: handball, beach paddles, gymkhana obstacle courses and relay races. Before leaving, the whole group gathers in a circle to share their favourite memory of Tenerife."
          - 'button "Day 14: Loro Parque — tap to read description" [ref=e333] [cursor=pointer]':
            - img "Loro Parque" [ref=e335]
            - generic [ref=e336]:
              - paragraph [ref=e337]: Day 14
              - heading "Loro Parque" [level=3] [ref=e338]
            - paragraph [ref=e340]: The final special-day excursion takes campers to Loro Parque, one of Europe's most celebrated wildlife parks. The visit is designed not just as a fun day out, but as a meaningful encounter with animal welfare and biodiversity conservation — themes that connect to the broader values of the camp.
          - 'button "Day 15: Farewell & the jar of messages — tap to read description" [ref=e341] [cursor=pointer]':
            - img "Farewell & the jar of messages" [ref=e343]
            - generic [ref=e344]:
              - paragraph [ref=e345]: Day 15
              - heading "Farewell & the jar of messages" [level=3] [ref=e346]
            - paragraph [ref=e348]: "The last day brings the group together for a final activity: the jar of messages. Each camper writes a note — a reflection, an encouragement, a memory — folds it up and adds it to a shared jar. It's a simple, powerful way to close two weeks of shared experience. The day ends with a collective farewell discussion and the kind of goodbyes that usually involve promises to stay in touch."
      - generic [ref=e354]:
        - generic [ref=e355]:
          - heading "VENUE" [level=2] [ref=e356]:
            - generic [ref=e358]: VENUE
          - paragraph [ref=e359]: Two weeks on the northern coast of Tenerife — a 4-star hotel two minutes from the beach, dedicated classrooms a short walk away, and the rest of the island within easy reach for the afternoon programme.
        - generic [ref=e360]:
          - generic [ref=e361]:
            - heading "The hotel" [level=3] [ref=e362]
            - paragraph [ref=e363]: Campers stay at a 4-star property in Puerto de la Cruz, two minutes on foot from Martiánez beach. Rooms are shared between three campers, with all meals — breakfast, lunch and dinner — included on site. The northern coast keeps a mild climate even at the height of summer, so the hotel terrace becomes a second living room.
          - img "The hotel" [ref=e365]
        - generic [ref=e366]:
          - generic [ref=e367]:
            - heading "The classrooms" [level=3] [ref=e368]
            - paragraph [ref=e369]: Teaching happens in a dedicated block of four classrooms plus a larger seminar hall — flexible enough for a morning lecture and an afternoon hackathon. Wi-fi is fast, wired desks are available for heavier workloads, and a small library and outdoor shaded terrace round out the spaces students gravitate to between sessions.
          - img "The classrooms" [ref=e371]
