          - generic [ref=e418]: A DAY AT TENERIFE
        - paragraph [ref=e419]: Every day at the camp follows the same rhythm — morning learning blocks, an unhurried lunch, the afternoon programme on the island, dinner together, and a deliberately quiet evening before the next early start. Here's how a typical day breaks down.
