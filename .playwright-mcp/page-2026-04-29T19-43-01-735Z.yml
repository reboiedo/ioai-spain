              - heading "The academics and the summer are both real" [level=3] [ref=e66]
              - paragraph [ref=e67]: The learning program and the extracurricular program are built with equal care. Mornings go deep into AI. Afternoons go to Tenerife's beaches, trails, and historic towns. Neither half is filler, and you don't have to sacrifice one to get the other.
            - article [ref=e68]:
              - heading "Two tracks, one community" [level=3] [ref=e69]
              - paragraph [ref=e70]: Foundations and applied ML run in parallel, plus a team research sprint that cuts across both. Mornings you're in your track; afternoons and evenings the whole cohort is together — meals, labs, problem sets, hikes.
            - article [ref=e71]:
              - heading "The highest level is in the room" [level=3] [ref=e72]
              - paragraph [ref=e73]: Students selected from the IOAI Spain qualifier, taught by researchers who publish at NeurIPS and ICML, with industry mentors from Barcelona's AI labs. Ambition is the baseline.
