            - heading "Early rise" [level=3] [ref=e424]
            - paragraph [ref=e425]: The day starts with a morning workout, a quick clean-up, and the day's announcements. Then a generous breakfast to power through the first lecture block.
          - article [ref=e426]:
            - paragraph [ref=e427]: 9:30am – 11:00am
            - heading "1st period" [level=3] [ref=e428]
            - paragraph [ref=e429]: Students pick up the day's coding skills through a mix of lectures, hands-on practice, and short quizzes that keep the room awake and accountable.
          - article [ref=e430]:
            - paragraph [ref=e431]: 11:00am – 11:30am
            - heading "Snack time" [level=3] [ref=e432]
            - paragraph [ref=e433]: A short break to recharge with something nutritious. Energy back up, attention reset, ready for the next block.
          - article [ref=e434]:
            - paragraph [ref=e435]: 11:30am – 1:00pm
            - heading "2nd period" [level=3] [ref=e436]
            - paragraph [ref=e437]: The second teaching block leans into individual practice — the instructor circulates while students build their own small projects from the morning's material.
          - article [ref=e438]:
            - paragraph [ref=e439]: 1:30pm – 4:00pm
            - heading "Lunch" [level=3] [ref=e440]
            - paragraph [ref=e441]: A long, well-balanced lunch on site. Time to eat, talk, and rest before the afternoon programme picks up.
          - article [ref=e442]:
            - paragraph [ref=e443]: 4:00pm – 7:00pm
            - heading "Activities" [level=3] [ref=e444]
            - paragraph [ref=e445]: The full afternoon goes to the extracurricular programme — beach sports, hikes, cultural walks, surfing, the workshops, the day trips. See the previous section for the day-by-day plan.
          - article [ref=e446]:
            - paragraph [ref=e447]: 7:00pm – 8:00pm
            - heading "Dinner" [level=3] [ref=e448]
            - paragraph [ref=e449]: Dinner together as a cohort — fresh seafood, Mediterranean staples, and locally-sourced produce on a rotating menu.
          - article [ref=e450]:
            - paragraph [ref=e451]: 8:00pm – 10:00pm
            - heading "Wind down" [level=3] [ref=e452]
            - paragraph [ref=e453]: The last hours of the day are deliberately unstructured — chill time, an optional movie, occasional quizzes or stargazing on the terrace, then lights out for an early start.
